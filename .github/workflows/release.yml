name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore VPinPerfMon.slnx

      - name: Build
        run: dotnet build VPinPerfMon.slnx --configuration Release --no-restore

      - name: Zip distrib
        run: Compress-Archive -Path distrib\* -DestinationPath VPinPerfMon-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VPinPerfMon ${{ github.ref_name }}
          generate_release_notes: true
          files: VPinPerfMon-${{ github.ref_name }}.zip
